<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahriar 2026 Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    cursor:none;
}

body{
    background:#0a0a0a;
    color:#fff;
    overflow-x:hidden;
}

/* CUSTOM CURSOR */
.cursor{
    width:15px;
    height:15px;
    border:2px solid #00f7ff;
    border-radius:50%;
    position:fixed;
    transform:translate(-50%,-50%);
    pointer-events:none;
    transition:0.05s;
    z-index:9999;
}

/* PARTICLES */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
}

/* LOADER */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:fadeOut 2s forwards;
    animation-delay:2s;
}
.loader h1{
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    z-index:10;
}
nav a{
    color:#00f7ff;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}
nav a:hover{
    text-shadow:0 0 10px #00f7ff;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
.hero h1{
    font-size:3rem;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}
.typing{
    margin-top:10px;
    color:#aaa;
}

/* PROFILE */
.profile{
    width:160px;
    height:160px;
    border-radius:50%;
    border:3px solid #00f7ff;
    margin:20px;
    box-shadow:0 0 25px #00f7ff;
    animation:float 3s infinite ease-in-out;
}
@keyframes float{
    50%{transform:translateY(-10px);}
}

/* SECTIONS */
section{
    padding:80px 10%;
}

.glass{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
    margin-top:20px;
}

/* SKILLS */
.skill{
    margin:10px 0;
}
.bar{
    width:100%;
    height:10px;
    background:#222;
    border-radius:20px;
}
.bar-fill{
    height:10px;
    background:#00f7ff;
    border-radius:20px;
    width:0;
    transition:2s;
}

/* DOWNLOAD CARDS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}
.card{
    padding:20px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    text-align:center;
    transition:0.4s;
    border:1px solid #111;
}
.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00f7ff;
}
.card a{
    color:#00f7ff;
    text-decoration:none;
}

/* CLOCK */
.clock{
    font-size:1.2rem;
    color:#00f7ff;
    margin-top:10px;
}

/* REVEAL */
.hidden{
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}
.show{
    opacity:1;
    transform:translateY(0);
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    color:#666;
}
</style>
</head>

<body>

<div class="loader">
    <h1>Loading 2026 World...</h1>
</div>

<div class="cursor"></div>

<canvas id="particles"></canvas>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#downloads">Downloads</a>
</nav>

<section class="hero" id="home">
    <img class="profile" src="https://scontent.fdac185-1.fna.fbcdn.net/v/t39.30808-6/646369085_122115056595177376_2006120704181105297_n.jpg">
    <h1>Shahriar</h1>
    <div class="typing" id="typing"></div>
    <div class="clock" id="clock"></div>
</section>

<section id="about" class="hidden">
<div class="glass">
<h2>About Me</h2>
<p>Name: Shahriar</p>
<p>Age: 17</p>
<p>Location: Pona, Kashiani, Gopalganj</p>
<p>Developer • Designer • Student</p>
</div>
</section>

<section id="skills" class="hidden">
<div class="glass">
<h2>Skills</h2>

<div class="skill">HTML<div class="bar"><div class="bar-fill" data-width="95%"></div></div></div>
<div class="skill">CSS<div class="bar"><div class="bar-fill" data-width="90%"></div></div></div>
<div class="skill">JavaScript<div class="bar"><div class="bar-fill" data-width="80%"></div></div></div>

</div>
</section>

<section id="downloads" class="hidden">
<div class="glass">
<h2>Downloads</h2>

<div class="grid">
<div class="card"><a href="#">Office 2019</a></div>
<div class="card"><a href="#">Photoshop</a></div>
<div class="card"><a href="#">Illustrator</a></div>
<div class="card"><a href="#">Games</a></div>
</div>

</div>
</section>

<footer>
© 2026 Shahriar | Future Web Developer
</footer>

<script>
// CURSOR
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.pageX+"px";
cursor.style.top=e.pageY+"px";
});

// TYPING
const text="Graphic Designer • Web Developer • Future Coder";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,80);
}
}
typing();

// CLOCK
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

// SCROLL REVEAL
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}
});
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

// SKILL ANIMATION
window.addEventListener("scroll",()=>{
document.querySelectorAll(".bar-fill").forEach(bar=>{
bar.style.width=bar.getAttribute("data-width");
});
});

// PARTICLES (simple)
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let dots=[];
for(let i=0;i<80;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00f7ff";

dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx.fill();

d.y+=0.5;
if(d.y>canvas.height)d.y=0;
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
